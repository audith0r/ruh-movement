<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FBFBF9" />
<title>РУХ — Стати частиною Орбіти</title>
<meta name="description" content="Заявка в Орбіту РУХ — екосистему людей, які будують через дію." />
<style>
  /* ============================================================
     DESIGN TOKENS (shared with directions.html)
     ============================================================ */
  :root {
    --bg:        #FBFBF9;
    --surface:   #FFFFFF;
    --ink:       #0A0A0B;
    --ink-2:     #2B2B30;
    --muted:     #74747C;
    --hairline:  rgba(10,10,11,0.08);
    --hairline-2:rgba(10,10,11,0.12);

    --green:     #18E08C;
    --purple:    #7C5CFF;
    --pink:      #FF7CC6;
    --teal:      #20D4C4;

    --green-soft: rgba(24,224,140,0.16);
    --purple-soft:rgba(124,92,255,0.16);
    --pink-soft:  rgba(255,124,198,0.16);
    --teal-soft:  rgba(32,212,196,0.16);

    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, Helvetica, Arial, sans-serif;

    --step--1: clamp(0.82rem, 0.78rem + 0.2vw, 0.92rem);
    --step-0:  clamp(1rem, 0.95rem + 0.25vw, 1.13rem);
    --step-1:  clamp(1.2rem, 1.05rem + 0.7vw, 1.6rem);
    --step-3:  clamp(2.2rem, 1.6rem + 3vw, 4rem);

    --gutter: clamp(1.25rem, 1rem + 3vw, 3.5rem);
    --maxw: 1240px;
    --r-md: 18px;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font);
    font-size: var(--step-0);
    line-height: 1.6;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
  }
  h1, h2, p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--green-soft); }

  .wrap { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: var(--gutter); }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 0.55em;
    font-size: var(--step--1); letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
  }
  .eyebrow .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulseDot 2.6s var(--ease-soft) infinite;
  }
  @keyframes pulseDot {
    0%   { box-shadow: 0 0 0 0 rgba(24,224,140,0.45); }
    70%  { box-shadow: 0 0 0 10px rgba(24,224,140,0); }
    100% { box-shadow: 0 0 0 0 rgba(24,224,140,0); }
  }
  .grad-text {
    background: linear-gradient(102deg, var(--purple) 0%, var(--pink) 45%, var(--green) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* ===================== NAV ===================== */
  .nav {
    position: fixed; inset: 0 0 auto 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: clamp(1rem, 0.8rem + 1vw, 1.6rem) var(--gutter);
    transition: background 0.4s var(--ease-soft), border-color 0.4s;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(251,251,249,0.72);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--hairline);
  }
  .brand { font-weight: 700; letter-spacing: 0.04em; font-size: 1.05rem; display: flex; align-items: center; gap: 0.5em; }
  .brand .glyph {
    width: 22px; height: 22px; border-radius: 7px;
    background: conic-gradient(from 140deg, var(--green), var(--purple), var(--pink), var(--green));
    box-shadow: 0 4px 18px -6px rgba(124,92,255,0.5);
  }
  .nav-group { display: flex; align-items: center; gap: 1.4rem; }
  .nav-link { font-size: var(--step--1); font-weight: 500; color: var(--muted); transition: color 0.25s; }
  .nav-link:hover { color: var(--ink); }
  .nav-cta {
    font-size: var(--step--1); font-weight: 500;
    padding: 0.6em 1.15em;
    border: 1px solid var(--hairline-2); border-radius: 999px;
    transition: border-color 0.3s, transform 0.3s var(--ease);
  }
  .nav-cta:hover { border-color: var(--ink); transform: translateY(-1px); }

  /* ===================== PAGE ===================== */
  main {
    flex: 1;
    position: relative;
    padding-block: clamp(8rem, 6rem + 6vw, 11rem) clamp(5rem, 4rem + 5vw, 8rem);
    overflow: hidden;
  }
  .page-bg {
    position: absolute; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(55% 45% at 12% 0%, var(--green-soft), transparent 60%),
      radial-gradient(50% 45% at 95% 20%, var(--purple-soft), transparent 60%),
      radial-gradient(45% 50% at 55% 105%, var(--pink-soft), transparent 60%);
    opacity: 0.9;
  }
  .page-head {
    display: flex; flex-direction: column; align-items: center; gap: 1.1rem;
    text-align: center;
    max-width: 56ch; margin: 0 auto clamp(3rem, 2rem + 4vw, 4.5rem);
  }
  .page-head h1 {
    font-size: var(--step-3); line-height: 1.04;
    letter-spacing: -0.025em; font-weight: 650;
  }
  .page-head p { color: var(--muted); font-size: var(--step-1); line-height: 1.45; }

  /* ===================== FORM ===================== */
  .field { display: flex; flex-direction: column; gap: 0.5rem; min-width: 0; }
  .field label {
    font-size: var(--step--1); letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
  }
  .field input {
    font: inherit; color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--hairline-2); border-radius: 14px;
    padding: 0.85em 1em; width: 100%;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .field input::placeholder { color: #A7A7AD; }
  .field input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 4px var(--purple-soft);
  }
  .field--full { grid-column: 1 / -1; }
  .hp { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

  .orbit-form {
    display: grid; grid-template-columns: 1fr; gap: 1.4rem;
    max-width: 720px; margin: 0 auto;
  }
  @media (min-width: 620px) { .orbit-form { grid-template-columns: 1fr 1fr; } }

  /* multi-select cluster chips */
  .chips-label {
    font-size: var(--step--1); letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
  }
  .chips-hint { font-size: var(--step--1); color: var(--muted); margin-top: -0.2rem; }
  .chips { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.4rem; }
  .chip-toggle {
    font: inherit;
    font-size: var(--step--1);
    color: var(--ink-2);
    background: var(--surface);
    border: 1px solid var(--hairline-2);
    border-radius: 999px;
    padding: 0.65em 1.2em;
    cursor: pointer;
    transition: border-color 0.25s, background 0.3s var(--ease),
                color 0.25s, transform 0.25s var(--ease), box-shadow 0.3s var(--ease);
  }
  .chip-toggle:hover { border-color: var(--ink); transform: translateY(-1px); }
  .chip-toggle:focus-visible { outline: none; box-shadow: 0 0 0 4px var(--purple-soft); }
  .chip-toggle.on {
    border-color: transparent;
    background: linear-gradient(100deg, var(--accent-a, var(--purple)), var(--accent-b, var(--pink)));
    color: #fff;
    box-shadow: 0 10px 24px -12px var(--accent-a, var(--purple));
  }

  .form-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem 1.5rem; margin-top: 0.4rem; }
  .btn-build {
    display: inline-flex; align-items: center; gap: 0.7em;
    padding: 0.95em 1.7em; border-radius: 999px; border: 0;
    font: inherit; font-weight: 600; font-size: var(--step-0);
    color: var(--ink);
    background: linear-gradient(100deg, var(--green), #6BE0B0);
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
    box-shadow: 0 18px 40px -18px rgba(24,224,140,0.6);
  }
  .btn-build .arrow { transition: transform 0.4s var(--ease); }
  .btn-build:hover { transform: translateY(-2px); box-shadow: 0 24px 50px -18px rgba(24,224,140,0.7); }
  .btn-build:hover .arrow { transform: translateX(5px); }
  .btn-build[disabled] { opacity: 0.6; cursor: progress; }

  .form-status {
    margin: 0; font-size: var(--step--1);
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .form-status.show { opacity: 1; transform: none; }
  .form-status.ok   { color: #0FAE6B; }
  .form-status.err  { color: #E0464B; }

  /* ===================== FOOTER ===================== */
  footer.foot {
    border-top: 1px solid var(--hairline);
    padding: 2.5rem var(--gutter);
    display: flex; flex-wrap: wrap; align-items: center;
    justify-content: space-between; gap: 1rem;
    color: var(--muted); font-size: var(--step--1);
  }
  footer.foot .brand { color: var(--ink); }

  /* ===================== REVEAL ===================== */
  .reveal {
    opacity: 0; transform: translateY(34px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  }
  .reveal.in { opacity: 1; transform: none; }
  .reveal[data-delay="1"] { transition-delay: 0.08s; }
  .reveal[data-delay="2"] { transition-delay: 0.16s; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    .reveal { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

  <!-- ===================== NAV ===================== -->
  <header class="nav" id="nav">
    <a href="index.html" class="brand" title="На головну"><span class="glyph" aria-hidden="true"></span>РУХ</a>
    <div class="nav-group">
      <a class="nav-link" href="directions.html">Напрямки</a>
      <a class="nav-cta" href="open-source.html">Open Source</a>
    </div>
  </header>

  <main>
    <div class="page-bg" aria-hidden="true"></div>

    <div class="wrap">
      <div class="page-head reveal in">
        <span class="eyebrow"><span class="dot"></span>Орбіта · Заявка</span>
        <h1>Стати частиною <span class="grad-text">Орбіти</span></h1>
        <p>Не для всіх. Але якщо ти будуєш, створюєш або рухаєш культуру — залиш заявку, і ми вийдемо на зв'язок.</p>
      </div>

      <form class="orbit-form reveal in" data-delay="1"
            action="https://formspree.io/f/xgobzwqk" method="POST">
        <!-- анти-спам honeypot -->
        <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
        <input type="hidden" name="_subject" value="Нова заявка в Орбіту — РУХ">
        <!-- сюди JS збирає всі вибрані кластери -->
        <input type="hidden" name="clusters" id="clusters-input" value="">

        <div class="field">
          <label for="f-name">Ім'я</label>
          <input id="f-name" name="name" type="text" required placeholder="Як до тебе звертатися">
        </div>
        <div class="field">
          <label for="f-email">Пошта</label>
          <input id="f-email" name="email" type="email" required placeholder="you@email.com">
        </div>
        <div class="field">
          <label for="f-phone">Номер телефону</label>
          <input id="f-phone" name="phone" type="tel" placeholder="+380 __ ___ __ __">
        </div>
        <div class="field">
          <label for="f-social">Соцмережа</label>
          <input id="f-social" name="social" type="text" placeholder="@instagram / telegram / посилання">
        </div>

        <div class="field field--full">
          <span class="chips-label" id="chips-label">Куди тягне — кластери</span>
          <span class="chips-hint">Можна вибрати декілька.</span>
          <div class="chips" role="group" aria-labelledby="chips-label">
            <button type="button" class="chip-toggle" data-value="Tech & AI" aria-pressed="false"
                    style="--accent-a:#18E08C; --accent-b:#20D4C4;">Tech &amp; AI</button>
            <button type="button" class="chip-toggle" data-value="Business & Moneymaking" aria-pressed="false"
                    style="--accent-a:#7C5CFF; --accent-b:#9B7CFF;">Business &amp; Moneymaking</button>
            <button type="button" class="chip-toggle" data-value="Culture & Art" aria-pressed="false"
                    style="--accent-a:#FF7CC6; --accent-b:#FF9CD6;">Culture &amp; Art</button>
            <button type="button" class="chip-toggle" data-value="Self-Evolution" aria-pressed="false"
                    style="--accent-a:#20D4C4; --accent-b:#18E08C;">Self-Evolution</button>
          </div>
        </div>

        <div class="field--full form-actions">
          <button type="submit" class="btn-build">
            Надіслати заявку <span class="arrow">→</span>
          </button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </div>
      </form>
    </div>
  </main>

  <footer class="foot">
    <span class="brand"><span class="glyph" aria-hidden="true"></span>РУХ — ruh-movement</span>
    <span>Action over talk · © <span id="year"></span></span>
  </footer>

<script>
(function () {
  "use strict";

  document.getElementById("year").textContent = new Date().getFullYear();

  /* ---------- nav background on scroll ---------- */
  var nav = document.getElementById("nav");
  var onScrollNav = function () {
    if (window.scrollY > 24) nav.classList.add("scrolled");
    else nav.classList.remove("scrolled");
  };
  onScrollNav();
  window.addEventListener("scroll", onScrollNav, { passive: true });

  /* ---------- multi-select cluster chips ---------- */
  var chips = document.querySelectorAll(".chip-toggle");
  var clustersInput = document.getElementById("clusters-input");
  function syncClusters() {
    var picked = [];
    chips.forEach(function (b) {
      if (b.classList.contains("on")) picked.push(b.dataset.value);
    });
    clustersInput.value = picked.join(", ");
  }
  chips.forEach(function (btn) {
    btn.addEventListener("click", function () {
      btn.classList.toggle("on");
      btn.setAttribute("aria-pressed", btn.classList.contains("on") ? "true" : "false");
      syncClusters();
    });
  });

  /* ---------- Formspree AJAX submit ---------- */
  var form = document.querySelector(".orbit-form");
  var status = form.querySelector(".form-status");
  var btn = form.querySelector("button[type=submit]");
  function setStatus(msg, kind) {
    status.textContent = msg;
    status.className = "form-status show " + kind;
  }
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var hp = form.querySelector(".hp");
    if (hp && hp.value) return; // bot
    syncClusters();
    if (!clustersInput.value) {
      setStatus("Вибери хоча б один кластер.", "err");
      return;
    }
    var label = btn.innerHTML;
    btn.disabled = true; btn.textContent = "Надсилаю…";
    fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      headers: { Accept: "application/json" }
    }).then(function (res) {
      if (res.ok) {
        form.reset();
        chips.forEach(function (b) {
          b.classList.remove("on");
          b.setAttribute("aria-pressed", "false");
        });
        clustersInput.value = "";
        setStatus("Готово ✓ Заявку отримано. Ми вийдемо на зв'язок.", "ok");
      } else {
        return res.json().then(function (data) {
          var m = (data && data.errors)
            ? data.errors.map(function (x) { return x.message; }).join(", ")
            : "Спробуй ще раз.";
          throw new Error(m);
        });
      }
    }).catch(function (err) {
      setStatus("Не вдалося надіслати: " + err.message, "err");
    }).finally(function () {
      btn.disabled = false; btn.innerHTML = label;
    });
  });
})();
</script>
</body>
</html>
